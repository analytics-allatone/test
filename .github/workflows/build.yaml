name: Build Pyinstaller Executables

on:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt
          pip install nuitka
      - name: Create runtime_config.py
        shell: pwsh
        run: |
            @'
            SERVER_IP = "1.2.3.4"
            AGENT_NAME = "agent1"
            '@ | Set-Content agent/runtime_config.py
      - name: Build with pyinstaller
        shell: cmd
        run: |
            pyinstaller --onefile --name sentinel agent/main.py
          # python -m nuitka --onefile  --output-filename=sentinel --output-dir=dist agent/main.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with pyinstaller
        run: |
          pyinstaller \
            --onefile \
            --name sentinel \
            agent/main.py

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-executable
          path: dist/*
